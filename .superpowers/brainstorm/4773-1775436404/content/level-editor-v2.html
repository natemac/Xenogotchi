<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XenoGotchi — Arkanoid Level Editor</title>
  <style>
    :root {
      --bg-dark: #00152b;
      --bg-line: #0060ff;
      --steel-light: #d8d8d8;
      --steel-mid:   #9a9a9a;
      --steel-dark:  #666;
      --rail-w: 15px;
      --cols: 12;
      --rows: 20;
      --cell: 30px;
      --gap:  2px;
      --game-w: calc(var(--rail-w)*2 + var(--cols)*var(--cell) + (var(--cols) - 1)*var(--gap));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 16px;
    }

    h1 {
      color: #ff4a1f;
      font-size: 16px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #ff4a1f88;
    }

    .workspace {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── GAME FRAME ── */
    .game-frame {
      position: relative;
      width: var(--game-w);
      background:
        repeating-linear-gradient(90deg, var(--bg-line) 0 2px, transparent 2px 28px, var(--bg-line) 28px 30px, transparent 30px 56px),
        repeating-linear-gradient( 0deg, var(--bg-line) 0 2px, transparent 2px 28px, var(--bg-line) 28px 30px, transparent 30px 56px),
        var(--bg-dark);
      border: 3px solid #333;
      user-select: none;
      padding-bottom: 12px;
    }

    /* Rails */
    .rail {
      position: absolute;
      top: 0; bottom: 0;
      width: var(--rail-w);
      background: linear-gradient(90deg, var(--steel-dark), var(--steel-light), var(--steel-mid), var(--steel-light), var(--steel-dark));
      z-index: 10;
    }
    .rail.left  { left: 0; }
    .rail.right { right: 0; }
    .rail::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(180deg,
        rgba(255,255,255,.2) 0 14px, rgba(0,0,0,.35) 14px 16px,
        rgba(255,255,255,.1) 16px 30px, rgba(0,0,0,.45) 30px 32px);
      mix-blend-mode: multiply;
    }

    /* Eggs row */
    .frame-eggs {
      padding: 10px var(--rail-w) 6px;
      display: flex;
      justify-content: space-around;
    }
    .egg-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .egg-shape {
      width: 28px; height: 40px;
      border-radius: 50% 50% 48% 48% / 58% 58% 42% 42%;
      box-shadow: inset -3px -5px 0 rgba(0,0,0,.22), inset 3px 5px 0 rgba(255,255,255,.1);
    }
    .egg-shape.crimson  { background: #f33; }
    .egg-shape.obsidian { background: #5ce7ff; }
    .egg-shape.ivory    { background: #3cff3c; }

    /* thin separator under eggs */
    .egg-separator {
      margin: 0 var(--rail-w);
      height: 2px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 4px;
    }

    /* ── EDITABLE BRICK GRID ── */
    .brick-area {
      padding: 0 var(--rail-w);
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell));
      gap: var(--gap);
      cursor: crosshair;
    }

    .cell {
      width: var(--cell);
      height: 14px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.04);
      position: relative;
    }
    .cell:hover { border-color: rgba(255,255,255,0.15); }

    .cell.filled::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,.25);
      pointer-events: none;
    }

    .cell[data-str="2"]::before {
      content: '●';
      position: absolute; right: 2px; bottom: 0;
      font-size: 6px; color: rgba(255,255,255,.45);
      line-height: 1; pointer-events: none;
    }
    .cell[data-str="3"]::before {
      content: '●●';
      position: absolute; right: 2px; bottom: 0;
      font-size: 6px; color: rgba(255,255,255,.45);
      line-height: 1; pointer-events: none;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 200px;
    }

    .panel {
      background: #111;
      border: 1px solid #2a2a2a;
      padding: 12px;
    }

    .panel-title {
      color: #ff4a1f;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      border-bottom: 1px solid #222;
      padding-bottom: 6px;
    }

    /* Palette */
    .palette {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .swatch {
      width: 100%;
      aspect-ratio: 1.6;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
      position: relative;
    }
    .swatch::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,.25);
    }
    .swatch:hover   { transform: scale(1.1); }
    .swatch.active  { border-color: #fff; transform: scale(1.12); }
    .swatch.eraser  {
      background: transparent !important;
      border: 2px dashed #555;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .swatch.eraser.active { border-color: #fff; }
    .swatch.eraser::after { display: none; }

    /* Strength */
    .strength-row { display: flex; gap: 5px; }
    .str-btn {
      flex: 1; padding: 5px 0;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      font-family: monospace; font-size: 11px;
      cursor: pointer; text-align: center;
      transition: all 0.1s;
    }
    .str-btn:hover  { border-color: #888; color: #fff; }
    .str-btn.active { border-color: #ff4a1f; color: #ff4a1f; background: #1a0d00; }

    /* Actions */
    .action-btn {
      width: 100%; padding: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      font-family: monospace; font-size: 11px;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; text-align: center;
      margin-bottom: 5px;
      transition: all 0.1s;
    }
    .action-btn:hover  { border-color: #fff; color: #fff; background: #222; }
    .action-btn.danger { border-color: #500; color: #f55; }
    .action-btn.danger:hover { background: #1a0000; border-color: #f55; }
    .action-btn.primary { border-color: #0a4; color: #0f0; }
    .action-btn.primary:hover { background: #001a05; border-color: #0f0; }

    #output {
      width: 100%; height: 80px;
      background: #000; border: 1px solid #333;
      color: #0f0; font-family: monospace; font-size: 9px;
      padding: 5px; resize: none; display: none;
    }

    .zone-info { font-size: 10px; color: #666; line-height: 1.7; }
    .zone-info span { color: #aaa; }

    #statusbar {
      font-size: 10px; color: #555;
      letter-spacing: 1px; text-align: center;
    }
  </style>
</head>
<body>

<h1>⬛ XenoGotchi — Level Editor ⬛</h1>
<div id="statusbar">LEFT CLICK: paint &nbsp;|&nbsp; RIGHT CLICK: erase &nbsp;|&nbsp; DRAG to fill</div>

<div class="workspace">

  <!-- GAME FRAME -->
  <div class="game-frame">
    <div class="rail left"></div>
    <div class="rail right"></div>

    <!-- Eggs -->
    <div class="frame-eggs">
      <div class="egg-slot">
        <div class="egg-shape crimson"></div>
      </div>
      <div class="egg-slot">
        <div class="egg-shape obsidian"></div>
      </div>
      <div class="egg-slot">
        <div class="egg-shape ivory"></div>
      </div>
    </div>

    <div class="egg-separator"></div>

    <!-- Editable grid -->
    <div class="brick-area">
      <div id="grid"></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="panel">
      <div class="panel-title">Color</div>
      <div class="palette" id="palette"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Brick Strength</div>
      <div class="strength-row" id="strengthRow">
        <button class="str-btn active" data-str="1">1 hit</button>
        <button class="str-btn" data-str="2">2 hits</button>
        <button class="str-btn" data-str="3">3 hits</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Zone Guide</div>
      <div class="zone-info">
        <span style="color:#f33">■</span> Crimson egg zone<br>
        <span style="color:#5ce7ff">■</span> Obsidian egg zone<br>
        <span style="color:#3cff3c">■</span> Ivory egg zone<br>
        <span style="color:#d5c81b">■</span> Shared thermal seal
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Actions</div>
      <button class="action-btn primary" onclick="exportLayout()">Export JSON</button>
      <button class="action-btn primary" onclick="copyLayout()">Copy to Clipboard</button>
      <button class="action-btn danger" onclick="clearGrid()">Clear All</button>
      <textarea id="output" readonly></textarea>
    </div>

  </div>
</div>

<script>
  const COLS = 12;
  const ROWS = 20;

  const COLORS = [
    { id: 'yellow',  hex: '#d5c81b', label: 'Thermal Seal' },
    { id: 'orange',  hex: '#f5821f', label: 'Orange' },
    { id: 'red',     hex: '#ff4a3c', label: 'Crimson Egg' },
    { id: 'cyan',    hex: '#5ce7ff', label: 'Obsidian Egg' },
    { id: 'green',   hex: '#3cff3c', label: 'Ivory Egg' },
    { id: 'pink',    hex: '#ff76ef', label: 'Pink' },
    { id: 'blue',    hex: '#78bcff', label: 'Blue' },
    { id: 'white',   hex: '#d8d8d8', label: 'White' },
    { id: 'gray',    hex: '#888888', label: 'Gray' },
    { id: 'darkred', hex: '#8b0000', label: 'Dark Red' },
    { id: 'teal',    hex: '#007a7a', label: 'Dark Cyan' },
    { id: 'eraser',  hex: null,      label: 'Erase' },
  ];

  let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  let painting = false;
  let paintMode = 'fill';
  let currentColor = COLORS[0];
  let currentStrength = 1;

  // Build palette
  const paletteEl = document.getElementById('palette');
  COLORS.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (col.id === 'eraser' ? ' eraser' : '') + (col === currentColor ? ' active' : '');
    sw.title = col.label;
    if (col.hex) sw.style.background = col.hex;
    else sw.textContent = '✕';
    sw.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      currentColor = col;
      updateStatus();
    });
    paletteEl.appendChild(sw);
  });

  // Build grid
  const gridEl = document.getElementById('grid');
  const cells = Array.from({ length: ROWS }, (_, r) =>
    Array.from({ length: COLS }, (_, c) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      gridEl.appendChild(cell);
      return cell;
    })
  );

  function paintCell(r, c, forceErase) {
    const erase = forceErase || currentColor.id === 'eraser';
    if (erase) {
      grid[r][c] = null;
      cells[r][c].className = 'cell';
      cells[r][c].style.background = '';
      cells[r][c].removeAttribute('data-str');
    } else {
      grid[r][c] = { color: currentColor.hex, colorId: currentColor.id, str: currentStrength };
      cells[r][c].className = 'cell filled';
      cells[r][c].style.background = currentColor.hex;
      cells[r][c].dataset.str = currentStrength;
    }
    updateStatus();
  }

  gridEl.addEventListener('mousedown', e => {
    if (e.button !== 0 && e.button !== 2) return;
    e.preventDefault();
    painting = true;
    paintMode = e.button === 2 ? 'erase' : 'fill';
    const cell = e.target.closest('.cell');
    if (cell) paintCell(+cell.dataset.r, +cell.dataset.c, paintMode === 'erase');
  });

  gridEl.addEventListener('mousemove', e => {
    if (!painting) return;
    const cell = e.target.closest('.cell');
    if (cell) paintCell(+cell.dataset.r, +cell.dataset.c, paintMode === 'erase');
  });

  window.addEventListener('mouseup', () => { painting = false; });
  gridEl.addEventListener('contextmenu', e => e.preventDefault());

  document.getElementById('strengthRow').addEventListener('click', e => {
    const btn = e.target.closest('.str-btn');
    if (!btn) return;
    document.querySelectorAll('.str-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStrength = +btn.dataset.str;
    updateStatus();
  });

  function clearGrid() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = null;
        cells[r][c].className = 'cell';
        cells[r][c].style.background = '';
        cells[r][c].removeAttribute('data-str');
      }
    updateStatus();
  }

  function getLayoutData() {
    return {
      cols: COLS,
      rows: ROWS,
      bricks: grid.flatMap((row, r) =>
        row.map((cell, c) => cell ? { r, c, color: cell.color, colorId: cell.colorId, str: cell.str } : null)
           .filter(Boolean)
      )
    };
  }

  function exportLayout() {
    const out = document.getElementById('output');
    out.style.display = 'block';
    out.value = JSON.stringify(getLayoutData(), null, 2);
  }

  function copyLayout() {
    navigator.clipboard.writeText(JSON.stringify(getLayoutData(), null, 2)).then(() => {
      updateStatus('✓ Copied to clipboard!');
      setTimeout(updateStatus, 2000);
    });
  }

  function updateStatus(msg) {
    const bar = document.getElementById('statusbar');
    if (msg) { bar.textContent = msg; return; }
    const brickCount = grid.flat().filter(Boolean).length;
    bar.textContent = currentColor.id === 'eraser'
      ? `MODE: ERASE  |  BRICKS: ${brickCount}`
      : `COLOR: ${currentColor.label.toUpperCase()}  |  STRENGTH: ${currentStrength}  |  BRICKS: ${brickCount}`;
  }

  updateStatus();
</script>
</body>
</html>

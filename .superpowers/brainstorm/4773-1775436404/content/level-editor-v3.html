<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XenoGotchi — Arkanoid Level Editor</title>
  <style>
    :root {
      --bg-dark: #00152b;
      --bg-line: #0060ff;
      --steel-light: #d8d8d8;
      --steel-mid:   #9a9a9a;
      --steel-dark:  #666;
      --rail-w: 15px;
      --cols: 12;
      --rows: 30;
      --cell-w: 30px;
      --cell-h: 16px;
      --gap: 2px;
      --game-w: calc(var(--rail-w)*2 + var(--cols)*var(--cell-w) + (var(--cols) - 1)*var(--gap));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 14px;
    }

    h1 {
      color: #ff4a1f;
      font-size: 15px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 10px #ff4a1f88;
    }

    .workspace {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ── GAME FRAME ── */
    .game-frame {
      position: relative;
      width: var(--game-w);
      background:
        repeating-linear-gradient(90deg, var(--bg-line) 0 2px, transparent 2px 28px, var(--bg-line) 28px 30px, transparent 30px 56px),
        repeating-linear-gradient( 0deg, var(--bg-line) 0 2px, transparent 2px 28px, var(--bg-line) 28px 30px, transparent 30px 56px),
        var(--bg-dark);
      border: 3px solid #333;
      border-top: 3px solid #555;
      user-select: none;
      padding: 8px var(--rail-w);
    }

    /* Rails */
    .rail {
      position: absolute;
      top: 0; bottom: 0;
      width: var(--rail-w);
      background: linear-gradient(90deg, var(--steel-dark), var(--steel-light), var(--steel-mid), var(--steel-light), var(--steel-dark));
      z-index: 10;
    }
    .rail.left  { left: 0; }
    .rail.right { right: 0; }
    .rail::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(180deg,
        rgba(255,255,255,.2) 0 14px, rgba(0,0,0,.35) 14px 16px,
        rgba(255,255,255,.1) 16px 30px, rgba(0,0,0,.45) 30px 32px);
      mix-blend-mode: multiply;
    }

    /* ── GRID ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell-w));
      gap: var(--gap);
      cursor: crosshair;
      position: relative;
    }

    /* Standard brick cell */
    .cell {
      width: var(--cell-w);
      height: var(--cell-h);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.04);
      position: relative;
    }
    .cell:hover { border-color: rgba(255,255,255,0.18); }

    /* Brick highlight */
    .cell.filled::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,.28);
      pointer-events: none;
    }

    /* Strength dots */
    .cell[data-str="2"]::before {
      content: '●';
      position: absolute; right: 2px; bottom: 0;
      font-size: 6px; color: rgba(255,255,255,.5);
      line-height: 1; pointer-events: none;
    }
    .cell[data-str="3"]::before {
      content: '●●';
      position: absolute; right: 2px; bottom: 0;
      font-size: 6px; color: rgba(255,255,255,.5);
      line-height: 1; pointer-events: none;
    }

    /* ── EGG CELLS ── */
    /* Eggs span 3 rows visually; we handle via a positioned overlay */
    .cell.egg-cell {
      background: transparent !important;
      border-color: transparent !important;
      overflow: visible;
      z-index: 5;
    }
    .cell.egg-cell::after { display: none; }
    .cell.egg-cell::before { display: none; }

    .egg-overlay {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 26px;
      height: 38px;
      border-radius: 50% 50% 48% 48% / 58% 58% 42% 42%;
      box-shadow: inset -3px -5px 0 rgba(0,0,0,.25), inset 3px 5px 0 rgba(255,255,255,.12);
      pointer-events: none;
      z-index: 6;
    }
    .egg-overlay.crimson  { background: #f33; }
    .egg-overlay.obsidian { background: #5ce7ff; }
    .egg-overlay.ivory    { background: #3cff3c; }

    /* ── SIDEBAR ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 210px;
    }

    .panel {
      background: #111;
      border: 1px solid #2a2a2a;
      padding: 12px;
    }

    .panel-title {
      color: #ff4a1f;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      border-bottom: 1px solid #222;
      padding-bottom: 6px;
    }

    /* Brick palette */
    .palette {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .swatch {
      width: 100%;
      aspect-ratio: 1.6;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
      position: relative;
    }
    .swatch::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,.25);
    }
    .swatch:hover  { transform: scale(1.1); }
    .swatch.active { border-color: #fff; transform: scale(1.1); }
    .swatch.eraser {
      background: transparent !important;
      border: 2px dashed #444;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #666;
    }
    .swatch.eraser::after { display: none; }
    .swatch.eraser.active { border-color: #fff; color: #fff; }

    /* Egg palette */
    .egg-palette {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .egg-swatch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px;
      border: 2px solid #2a2a2a;
      transition: border-color 0.1s;
      flex: 1;
    }
    .egg-swatch:hover  { border-color: #666; }
    .egg-swatch.active { border-color: #fff; background: #1a1a1a; }
    .egg-pip {
      width: 22px; height: 32px;
      border-radius: 50% 50% 48% 48% / 58% 58% 42% 42%;
      box-shadow: inset -2px -4px 0 rgba(0,0,0,.2), inset 2px 4px 0 rgba(255,255,255,.12);
    }
    .egg-pip.crimson  { background: #f33; }
    .egg-pip.obsidian { background: #5ce7ff; }
    .egg-pip.ivory    { background: #3cff3c; }
    .egg-name { font-size: 8px; letter-spacing: 1px; color: #888; text-transform: uppercase; }

    /* Strength */
    .strength-row { display: flex; gap: 5px; }
    .str-btn {
      flex: 1; padding: 5px 0;
      background: #1a1a1a; border: 1px solid #333;
      color: #888; font-family: monospace; font-size: 11px;
      cursor: pointer; text-align: center; transition: all 0.1s;
    }
    .str-btn:hover  { border-color: #888; color: #fff; }
    .str-btn.active { border-color: #ff4a1f; color: #ff4a1f; background: #1a0d00; }
    .str-note { font-size: 9px; color: #444; margin-top: 6px; line-height: 1.5; }

    /* Actions */
    .action-btn {
      width: 100%; padding: 8px;
      background: #1a1a1a; border: 1px solid #333;
      color: #ccc; font-family: monospace; font-size: 11px;
      letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; text-align: center; margin-bottom: 5px; transition: all 0.1s;
    }
    .action-btn:hover  { border-color: #fff; color: #fff; background: #222; }
    .action-btn.danger { border-color: #500; color: #f55; }
    .action-btn.danger:hover { background: #1a0000; border-color: #f55; }
    .action-btn.primary { border-color: #0a4; color: #0f0; }
    .action-btn.primary:hover { background: #001a05; border-color: #0f0; }

    #output {
      width: 100%; height: 80px;
      background: #000; border: 1px solid #333;
      color: #0f0; font-family: monospace; font-size: 9px;
      padding: 5px; resize: none; display: none;
    }

    #statusbar {
      font-size: 10px; color: #555; letter-spacing: 1px; text-align: center;
    }
  </style>
</head>
<body>

<h1>⬛ XenoGotchi — Level Editor ⬛</h1>
<div id="statusbar">LEFT CLICK: paint &nbsp;|&nbsp; RIGHT CLICK: erase &nbsp;|&nbsp; DRAG to fill</div>

<div class="workspace">

  <!-- GAME FRAME -->
  <div class="game-frame">
    <div class="rail left"></div>
    <div class="rail right"></div>
    <div id="grid"></div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- EGG TYPES -->
    <div class="panel">
      <div class="panel-title">Egg Types</div>
      <div class="egg-palette" id="eggPalette">
        <div class="egg-swatch" data-egg="crimson">
          <div class="egg-pip crimson"></div>
          <div class="egg-name">Crimson</div>
        </div>
        <div class="egg-swatch" data-egg="obsidian">
          <div class="egg-pip obsidian"></div>
          <div class="egg-name">Obsidian</div>
        </div>
        <div class="egg-swatch" data-egg="ivory">
          <div class="egg-pip ivory"></div>
          <div class="egg-name">Ivory</div>
        </div>
      </div>
    </div>

    <!-- BRICK COLORS -->
    <div class="panel">
      <div class="panel-title">Brick Color</div>
      <div class="palette" id="palette"></div>
    </div>

    <!-- STRENGTH -->
    <div class="panel">
      <div class="panel-title">Brick Strength</div>
      <div class="strength-row" id="strengthRow">
        <button class="str-btn active" data-str="1">1 hit</button>
        <button class="str-btn" data-str="2">2 hits</button>
        <button class="str-btn" data-str="3">3 hits</button>
      </div>
      <div class="str-note">Dots on brick = hits required.<br>Strength only applies to bricks, not eggs.</div>
    </div>

    <!-- ACTIONS -->
    <div class="panel">
      <div class="panel-title">Actions</div>
      <button class="action-btn primary" onclick="exportLayout()">Export JSON</button>
      <button class="action-btn primary" onclick="copyLayout()">Copy to Clipboard</button>
      <button class="action-btn danger" onclick="clearGrid()">Clear All</button>
      <textarea id="output" readonly></textarea>
    </div>

  </div>
</div>

<script>
  const COLS = 12;
  const ROWS = 30;

  const BRICK_COLORS = [
    { id: 'yellow',  hex: '#d5c81b', label: 'Thermal Seal' },
    { id: 'orange',  hex: '#f5821f', label: 'Orange' },
    { id: 'red',     hex: '#ff4a3c', label: 'Crimson Zone' },
    { id: 'cyan',    hex: '#5ce7ff', label: 'Obsidian Zone' },
    { id: 'green',   hex: '#3cff3c', label: 'Ivory Zone' },
    { id: 'pink',    hex: '#ff76ef', label: 'Pink' },
    { id: 'blue',    hex: '#78bcff', label: 'Blue' },
    { id: 'white',   hex: '#d8d8d8', label: 'White' },
    { id: 'gray',    hex: '#888',    label: 'Gray' },
    { id: 'darkred', hex: '#8b0000', label: 'Dark Red' },
    { id: 'teal',    hex: '#007a7a', label: 'Dark Cyan' },
    { id: 'eraser',  hex: null,      label: 'Erase' },
  ];

  // Tool state
  // mode: 'brick' | 'egg' | 'erase'
  let mode = 'brick';
  let currentBrickColor = BRICK_COLORS[0];
  let currentEggType = null;   // 'crimson' | 'obsidian' | 'ivory'
  let currentStrength = 1;

  // Grid data: null | { type:'brick', color, colorId, str } | { type:'egg', eggType }
  let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

  let painting = false;
  let paintErase = false;

  // ── BUILD BRICK PALETTE ──
  const paletteEl = document.getElementById('palette');
  BRICK_COLORS.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (col.id === 'eraser' ? ' eraser' : '') + (col === currentBrickColor && mode === 'brick' ? ' active' : '');
    sw.title = col.label;
    if (col.hex) sw.style.background = col.hex;
    else sw.textContent = '✕';
    sw.addEventListener('click', () => {
      if (col.id === 'eraser') {
        setMode('erase');
      } else {
        currentBrickColor = col;
        setMode('brick');
      }
      updatePaletteUI();
      updateStatus();
    });
    paletteEl.appendChild(sw);
  });

  // ── BUILD EGG PALETTE ──
  document.getElementById('eggPalette').addEventListener('click', e => {
    const sw = e.target.closest('.egg-swatch');
    if (!sw) return;
    currentEggType = sw.dataset.egg;
    setMode('egg');
    updatePaletteUI();
    updateStatus();
  });

  function setMode(m) {
    mode = m;
    if (m === 'egg') currentBrickColor = null;
  }

  function updatePaletteUI() {
    // Brick swatches
    document.querySelectorAll('.swatch').forEach((sw, i) => {
      const col = BRICK_COLORS[i];
      const isActive = mode === 'brick' && col === currentBrickColor;
      const isEraseActive = mode === 'erase' && col.id === 'eraser';
      sw.classList.toggle('active', isActive || isEraseActive);
    });
    // Egg swatches
    document.querySelectorAll('.egg-swatch').forEach(sw => {
      sw.classList.toggle('active', mode === 'egg' && sw.dataset.egg === currentEggType);
    });
  }

  // ── BUILD GRID ──
  const gridEl = document.getElementById('grid');
  const cells = Array.from({ length: ROWS }, (_, r) =>
    Array.from({ length: COLS }, (_, c) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      gridEl.appendChild(cell);
      return cell;
    })
  );

  // ── PAINT ──
  function paintCell(r, c, forceErase) {
    const erase = forceErase || mode === 'erase';
    const cell = cells[r][c];

    // Clear existing egg overlay if present
    const existing = cell.querySelector('.egg-overlay');
    if (existing) existing.remove();

    if (erase) {
      grid[r][c] = null;
      cell.className = 'cell';
      cell.style.background = '';
      cell.removeAttribute('data-str');
    } else if (mode === 'egg') {
      grid[r][c] = { type: 'egg', eggType: currentEggType };
      cell.className = 'cell egg-cell';
      cell.style.background = '';
      cell.removeAttribute('data-str');
      const ov = document.createElement('div');
      ov.className = `egg-overlay ${currentEggType}`;
      cell.appendChild(ov);
    } else {
      // brick
      grid[r][c] = { type: 'brick', color: currentBrickColor.hex, colorId: currentBrickColor.id, str: currentStrength };
      cell.className = 'cell filled';
      cell.style.background = currentBrickColor.hex;
      cell.dataset.str = currentStrength;
    }
    updateStatus();
  }

  gridEl.addEventListener('mousedown', e => {
    if (e.button !== 0 && e.button !== 2) return;
    e.preventDefault();
    painting = true;
    paintErase = e.button === 2;
    const cell = e.target.closest('.cell');
    if (cell) paintCell(+cell.dataset.r, +cell.dataset.c, paintErase);
  });

  gridEl.addEventListener('mousemove', e => {
    if (!painting) return;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const cell = el && el.closest('.cell');
    if (cell && cell.closest('#grid')) paintCell(+cell.dataset.r, +cell.dataset.c, paintErase);
  });

  window.addEventListener('mouseup', () => { painting = false; });
  gridEl.addEventListener('contextmenu', e => e.preventDefault());

  // ── STRENGTH ──
  document.getElementById('strengthRow').addEventListener('click', e => {
    const btn = e.target.closest('.str-btn');
    if (!btn) return;
    document.querySelectorAll('.str-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStrength = +btn.dataset.str;
    updateStatus();
  });

  // ── CLEAR ──
  function clearGrid() {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = null;
        cells[r][c].className = 'cell';
        cells[r][c].style.background = '';
        cells[r][c].removeAttribute('data-str');
        const ov = cells[r][c].querySelector('.egg-overlay');
        if (ov) ov.remove();
      }
    updateStatus();
  }

  // ── EXPORT ──
  function getLayoutData() {
    const items = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (grid[r][c]) items.push({ r, c, ...grid[r][c] });
    return { cols: COLS, rows: ROWS, items };
  }

  function exportLayout() {
    const out = document.getElementById('output');
    out.style.display = 'block';
    out.value = JSON.stringify(getLayoutData(), null, 2);
  }

  function copyLayout() {
    navigator.clipboard.writeText(JSON.stringify(getLayoutData(), null, 2)).then(() => {
      updateStatus('✓ Copied to clipboard!');
      setTimeout(updateStatus, 2000);
    });
  }

  // ── STATUS ──
  function updateStatus(msg) {
    const bar = document.getElementById('statusbar');
    if (msg) { bar.textContent = msg; return; }
    const total = grid.flat().filter(Boolean).length;
    const eggs = grid.flat().filter(c => c && c.type === 'egg').length;
    const bricks = total - eggs;
    if (mode === 'erase')
      bar.textContent = `MODE: ERASE  |  BRICKS: ${bricks}  EGGS: ${eggs}`;
    else if (mode === 'egg')
      bar.textContent = `EGG: ${currentEggType.toUpperCase()}  |  BRICKS: ${bricks}  EGGS: ${eggs}`;
    else
      bar.textContent = `BRICK: ${currentBrickColor.label.toUpperCase()}  |  STR: ${currentStrength}  |  BRICKS: ${bricks}  EGGS: ${eggs}`;
  }

  updateStatus();
</script>
</body>
</html>
